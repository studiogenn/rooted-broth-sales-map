<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rooted Broth — Sales Command Center</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#FAFAF7;--card:#fff;--border:#E8E5DF;--text:#2C2C2C;--muted:#8A8A8A;
  --accent:#B85C38;--accent2:#5C8A6F;--danielle:#C0392B;--yasmeen:#2980B9;
  --won:#27AE60;--lost:#95A5A6;--danger:#E74C3C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}

.header{background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.header h1 span{color:var(--accent)}
.stats{display:flex;gap:16px}
.stat{text-align:center}
.stat-num{font-size:20px;font-weight:800;color:var(--accent)}
.stat-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--border);align-items:center;gap:0}
.tab-btn{padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-actions{margin-left:auto;display:flex;gap:6px;padding-right:12px}

.layout{display:flex;height:calc(100vh - 94px)}
.sidebar{width:380px;min-width:380px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.controls{padding:8px 10px;border-bottom:1px solid var(--border);background:#FAFAF7}
.search-box{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;background:#fff;margin-bottom:5px}
.search-box:focus{border-color:var(--accent)}

.row{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap}
.pill{padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--muted);font-size:10px;cursor:pointer;transition:all .15s;user-select:none}
.pill:hover{border-color:var(--accent);color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pill.s-active{background:var(--accent2);border-color:var(--accent2);color:#fff}
.pill.t-all.active{background:var(--text);border-color:var(--text);color:#fff}
.pill.t-d.active{background:var(--danielle);border-color:var(--danielle);color:#fff}
.pill.t-y.active{background:var(--yasmeen);border-color:var(--yasmeen);color:#fff}

/* Bulk action bar */
.bulk-bar{display:none;padding:8px 12px;background:#FFF8F0;border-bottom:1px solid #f0ddd5;align-items:center;gap:8px;font-size:12px}
.bulk-bar.visible{display:flex}
.bulk-bar .count{font-weight:700;color:var(--accent)}
.bbtn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:10px;font-weight:600;cursor:pointer}
.bbtn:hover{background:#f5f5f0}
.bbtn.danger{color:var(--danger);border-color:var(--danger)}
.bbtn.danger:hover{background:var(--danger);color:#fff}

.business-list{flex:1;overflow-y:auto}
.nh-group{border-bottom:1px solid var(--border)}
.nh-header{padding:7px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#FAFAF7;position:sticky;top:0;z-index:2;border-left:3px solid var(--border)}
.nh-header:hover{background:#F0EDE8}
.nh-header .name{font-weight:600;font-size:12px}
.nh-header .cnt{font-size:10px;background:#E8E5DF;padding:1px 7px;border-radius:10px;color:var(--muted)}

.biz-card{padding:6px 10px;border-bottom:1px solid #f5f5f0;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:11px}
.biz-card:hover{background:#FAFAF7}
.biz-card.selected{background:#E8F4FD;border-left:3px solid var(--yasmeen)}
.biz-card .cb{width:14px;height:14px;border-radius:3px;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
.biz-card.selected .cb{background:var(--yasmeen);border-color:var(--yasmeen)}
.biz-info{flex:1;min-width:0}
.biz-name{font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.biz-sub{font-size:10px;color:var(--muted)}
.tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;display:inline-block;margin-right:2px}
.tag-d{background:rgba(192,57,43,.1);color:var(--danielle)}
.tag-y{background:rgba(41,128,185,.1);color:var(--yasmeen)}
.tag-s{background:rgba(92,138,111,.1);color:var(--accent2)}

#map{flex:1}

/* Detail panel */
.detail-panel{display:none;position:absolute;right:12px;top:108px;width:350px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:1000;border:1px solid var(--border);max-height:calc(100vh - 120px);overflow-y:auto}
.detail-panel.open{display:block}
.dp-head{padding:12px 14px;background:#FAFAF7;border-bottom:1px solid var(--border)}
.dp-head h3{font-size:14px;padding-right:20px}
.dp-head .sub{font-size:10px;color:var(--accent)}
.dp-head .addr{font-size:11px;color:var(--muted);margin-top:2px}
.dp-head .contact{font-size:10px;margin-top:3px;color:#555}
.dp-head .contact a{color:var(--accent);text-decoration:none}
.dp-close{position:absolute;top:10px;right:10px;background:none;border:none;font-size:16px;cursor:pointer;color:var(--muted)}

.dp-body{padding:12px 14px}
.dp-section{margin-bottom:10px}
.dp-section label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:4px}
.checks{display:flex;flex-wrap:wrap;gap:3px}
.chk{display:flex;align-items:center;gap:2px;padding:3px 8px;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:10px;user-select:none}
.chk.on{border-color:var(--accent2);background:rgba(92,138,111,.08);color:var(--accent2);font-weight:600}
.chk input{display:none}
.sel{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff}
.ta{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;min-height:40px;resize:vertical;font-family:inherit}
.email-box{background:#FFF8F5;border:1px solid #f0ddd5;border-radius:6px;padding:8px;margin-top:6px}
.email-box input,.email-box textarea{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:4px;font-size:11px;margin-bottom:4px;font-family:inherit}
.email-box textarea{min-height:50px;resize:vertical}

.dp-foot{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap}
.btn{padding:6px 10px;border-radius:6px;border:none;font-size:10px;font-weight:600;cursor:pointer}
.btn-p{background:var(--accent);color:#fff;flex:1}
.btn-p:hover{background:#9A4B2E}
.btn-z{background:#D4382C;color:#fff}
.btn-d{background:var(--danger);color:#fff}
.btn-d:hover{background:#c0392b}
.btn-e{background:#3498DB;color:#fff}
.btn-s{background:#E8E5DF;color:var(--text)}

/* Kanban */
.kanban-view,.pipeline-view{display:none;overflow:auto;background:var(--bg);padding:14px}
.kanban-view.visible,.pipeline-view.visible{display:block}
.kanban-board{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;min-height:calc(100vh - 160px)}
.kanban-col{min-width:230px;max-width:230px;background:#fff;border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 160px)}
.kanban-col-head{padding:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;border-radius:10px 10px 0 0}
.kanban-col-head .title{font-weight:700;font-size:12px}
.kanban-col-head .cnt{font-size:10px;background:#E8E5DF;padding:1px 7px;border-radius:10px;color:var(--muted)}
.kanban-col-body{flex:1;overflow-y:auto;padding:6px}
.kanban-card{padding:8px;background:var(--bg);border-radius:6px;margin-bottom:5px;cursor:pointer;border:1px solid transparent}
.kanban-card:hover{border-color:var(--accent)}
.kanban-card .kname{font-weight:600;font-size:11px}
.kanban-card .ksub{font-size:9px;color:var(--muted);margin-top:2px}
.kanban-card .ktags{margin-top:3px;display:flex;gap:2px;flex-wrap:wrap}

/* Pipeline table */
.pipe-stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.pipe-stat{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-width:90px;text-align:center}
.pipe-stat .num{font-size:20px;font-weight:800}
.pipe-stat .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.pipe-tbl{width:100%;background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.pipe-tbl table{width:100%;border-collapse:collapse;font-size:11px}
.pipe-tbl th{background:#FAFAF7;padding:8px 10px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0}
.pipe-tbl td{padding:6px 10px;border-bottom:1px solid #f5f5f0}
.pipe-tbl tr:hover{background:#FAFAF7;cursor:pointer}
.spill{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2C2C2C;color:#fff;padding:8px 18px;border-radius:8px;font-size:11px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}

.leaflet-popup-content-wrapper{border-radius:8px!important;box-shadow:0 3px 14px rgba(0,0,0,.1)!important}
@media(max-width:900px){.layout{flex-direction:column}.sidebar{width:100%;min-width:100%;max-height:40vh}}
</style>
</head>
<body>

<div class="header">
  <h1><span>Rooted Broth</span> — Sales Command Center</h1>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTotal">0</div><div class="stat-label">Targets</div></div>
    <div class="stat"><div class="stat-num" id="sContacted">0</div><div class="stat-label">Contacted</div></div>
    <div class="stat"><div class="stat-num" id="sWon">0</div><div class="stat-label">Won</div></div>
    <div class="stat"><div class="stat-num" id="sHoods">0</div><div class="stat-label">Areas</div></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('map')">Map</button>
  <button class="tab-btn" onclick="switchTab('kanban')">Kanban Board</button>
  <button class="tab-btn" onclick="switchTab('pipeline')">Pipeline Table</button>
  <div class="tab-actions">
    <button class="btn btn-s" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-z" onclick="connectZoho()">Zoho</button>
  </div>
</div>

<!-- MAP VIEW -->
<div id="mapView" class="layout">
  <div class="sidebar">
    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search businesses, areas, categories..." />
      <div class="row" id="terrRow"></div>
      <div class="row" id="catRow"></div>
      <div class="row" id="statusRow"></div>
    </div>
    <div class="bulk-bar" id="bulkBar">
      <span class="count" id="bulkCount">0</span> selected
      <button class="bbtn" onclick="bulkSetStatus('dm_sent')">DM Sent</button>
      <button class="bbtn" onclick="bulkSetStatus('emailed')">Emailed</button>
      <button class="bbtn" onclick="bulkSetStatus('called')">Called</button>
      <button class="bbtn" onclick="bulkSetStatus('visited')">Visited</button>
      <button class="bbtn danger" onclick="bulkDelete()">Delete</button>
      <button class="bbtn" onclick="clearSelection()" style="margin-left:auto">Clear</button>
    </div>
    <div class="business-list" id="bizList"></div>
  </div>
  <div id="map"></div>
</div>

<!-- KANBAN VIEW -->
<div id="kanbanView" class="kanban-view"></div>

<!-- PIPELINE TABLE VIEW -->
<div id="pipelineView" class="pipeline-view"></div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="dp-close" onclick="closeDetail()">&times;</button>
  <div class="dp-head">
    <h3 id="dName"></h3>
    <div class="sub" id="dCat"></div>
    <div class="addr" id="dAddr"></div>
    <div class="contact" id="dContact"></div>
  </div>
  <div class="dp-body">
    <div class="dp-section">
      <label>Outreach Status (check all that apply)</label>
      <div class="checks" id="dStatuses"></div>
    </div>
    <div class="dp-section">
      <label>Channels Used</label>
      <div class="checks" id="dChannels">
        <label class="chk" data-ch="instagram"><input type="checkbox" onchange="saveCh()">Instagram DM</label>
        <label class="chk" data-ch="email"><input type="checkbox" onchange="saveCh()">Email</label>
        <label class="chk" data-ch="phone"><input type="checkbox" onchange="saveCh()">Phone</label>
        <label class="chk" data-ch="in_person"><input type="checkbox" onchange="saveCh()">In-Person</label>
      </div>
    </div>
    <div class="dp-section">
      <label>Assigned To</label>
      <select class="sel" id="dAssigned" onchange="saveAssigned()">
        <option value="danielle">Danielle</option>
        <option value="yasmeen">Yasmeen</option>
      </select>
    </div>
    <div class="dp-section">
      <label>Notes</label>
      <textarea class="ta" id="dNotes" placeholder="Add notes..." onblur="saveNotes()"></textarea>
    </div>
    <div class="dp-section">
      <label>Quick Email</label>
      <div class="email-box">
        <input id="eTo" placeholder="To: email@business.com" />
        <input id="eSubject" placeholder="Subject" />
        <textarea id="eBody" placeholder="Hi..."></textarea>
        <div style="display:flex;gap:4px;margin-top:4px">
          <button class="btn btn-e" onclick="sendEmail()">Send via Zoho</button>
          <button class="btn btn-s" onclick="openMailto()">Open Mail App</button>
        </div>
      </div>
    </div>
  </div>
  <div class="dp-foot">
    <button class="btn btn-p" onclick="saveAndClose()">Save & Close</button>
    <button class="btn btn-z" onclick="syncOne()">Sync Zoho</button>
    <button class="btn btn-d" onclick="deleteOne()">Delete</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== STATE ==========
let BIZ=[], outreach={}, selected=new Set(), selBiz=null, curTab='map';
let fTerritory='all', fCats=new Set(), fStatuses=new Set(), fSearch='';
let markers=[];

const API = window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'
  ? '' : (localStorage.getItem('rb_api')||'');

// ========== CONSTANTS ==========
const DANIELLE_HOODS=new Set(['west village','east village','greenwich village','soho','noho','nolita','tribeca','flatiron / union square','flatiron/union square','chelsea','gramercy','lower east side']);
const STATUSES=['dm_sent','emailed','called','visited','follow_up','meeting_set','proposal_sent','won','not_interested'];
const SL={dm_sent:'DM Sent',emailed:'Emailed',called:'Called',visited:'Visited',follow_up:'Follow-Up',meeting_set:'Meeting Set',proposal_sent:'Proposal Sent',won:'Account Won',not_interested:'Not Interested',not_contacted:'Not Contacted'};
const SC={not_contacted:'#ccc',dm_sent:'#F39C12',emailed:'#3498DB',called:'#9B59B6',visited:'#E67E22',follow_up:'#E74C3C',meeting_set:'#2ECC71',proposal_sent:'#1ABC9C',won:'#27AE60',not_interested:'#95A5A6'};
const KANBAN_COLS=['Prospect','DM Sent','Emailed','Called','Visited','Meeting Set','Proposal Sent','Won','Not Interested'];
const KANBAN_MAP={Prospect:'not_contacted','DM Sent':'dm_sent',Emailed:'emailed',Called:'called',Visited:'visited','Meeting Set':'meeting_set','Proposal Sent':'proposal_sent',Won:'won','Not Interested':'not_interested'};

const COORDS={'upper west side':[40.787,-73.975],'upper east side':[40.774,-73.957],'west village':[40.734,-74.003],'east village':[40.727,-73.982],'greenwich village':[40.734,-73.997],'soho':[40.723,-73.999],'noho':[40.726,-73.993],'tribeca':[40.716,-74.009],'nolita':[40.723,-73.996],'lower east side':[40.715,-73.984],'chelsea':[40.747,-74.001],'flatiron / union square':[40.740,-73.990],'gramercy':[40.737,-73.985],'murray hill':[40.749,-73.976],"midtown west / hell's kitchen":[40.764,-73.992],'park slope':[40.671,-73.980],'cobble hill':[40.686,-73.996],'carroll gardens':[40.680,-73.999],'brooklyn heights':[40.696,-73.994],'dumbo':[40.703,-73.988],'williamsburg':[40.708,-73.957],'greenpoint':[40.727,-73.951],'fort greene':[40.689,-73.976],'prospect heights':[40.678,-73.969],'boerum hill':[40.685,-73.984],'gowanus':[40.673,-73.990],'astoria':[40.772,-73.930],'long island city':[40.743,-73.956],'forest hills':[40.719,-73.845],'jackson heights':[40.750,-73.883],
  // Cold-weather cities
  'portland':[45.523,-122.676],'seattle':[47.606,-122.332],'minneapolis':[44.978,-93.265],'denver':[39.739,-104.990],'boulder':[40.015,-105.271],'detroit':[42.331,-83.046],'ann arbor':[42.281,-83.748],'milwaukee':[43.039,-87.907],'anchorage':[61.218,-149.900],'missoula':[46.872,-114.000],'burlington':[44.476,-73.213],'portland me':[43.661,-70.256],'concord':[43.208,-71.538]};

function getTerritory(h){const l=(h||'').toLowerCase().trim();for(const d of DANIELLE_HOODS){if(l.includes(d)||d.includes(l))return 'danielle';}return 'yasmeen';}
function getCoords(h){const l=(h||'').toLowerCase().trim();for(const[k,v]of Object.entries(COORDS)){if(l.includes(k)||k.includes(l))return[v[0]+(Math.random()-.5)*.004,v[1]+(Math.random()-.5)*.004];}return[40.748+(Math.random()-.5)*.02,-73.986+(Math.random()-.5)*.02];}
function getCatGroup(c){c=(c||'').toLowerCase();if(c.includes('coffee')||c.includes('cafe'))return'coffee';if(c.includes('brunch')||c.includes('breakfast'))return'brunch';if(c.includes('grocery')||c.includes('market')||c.includes('deli'))return'grocery';if(c.includes('health')||c.includes('organic')||c.includes('natural'))return'health';if(c.includes('acai')||c.includes('smoothie')||c.includes('wellness'))return'wellness';if(c.includes('yoga')||c.includes('pilates')||c.includes('barre')||c.includes('fitness')||c.includes('cycling'))return'fitness';if(c.includes('ramen')||c.includes('soup')||c.includes('farm-to-table'))return'restaurant';if(c.includes('butcher')||c.includes('cheese')||c.includes('specialty')||c.includes('gourmet'))return'specialty';if(c.includes('co-work')||c.includes('cowork'))return'cowork';if(c.includes('pet'))return'pet';if(c.includes('supplement')||c.includes('vitamin'))return'supplement';if(c.includes('matcha')||c.includes('tea'))return'tea';if(c.includes('bakery'))return'bakery';if(c.includes('functional')||c.includes('chiro')||c.includes('naturo'))return'clinic';if(c.includes('meal prep')||c.includes('prepared'))return'mealprep';if(c.includes('food hall')||c.includes('cooking'))return'foodhall';return'other';}
const CC={coffee:'#8B4513',brunch:'#D4A574',grocery:'#2E7D32',health:'#4CAF50',wellness:'#9C27B0',fitness:'#E91E63',restaurant:'#FF5722',specialty:'#795548',cowork:'#607D8B',pet:'#FF9800',supplement:'#00BCD4',tea:'#689F38',bakery:'#F48FB1',clinic:'#5C6BC0',mealprep:'#26A69A',foodhall:'#8D6E63',other:'#9E9E9E'};
const CL={coffee:'Coffee',brunch:'Brunch',grocery:'Grocery',health:'Health Food',wellness:'Wellness',fitness:'Fitness/Yoga',restaurant:'Restaurant',specialty:'Specialty Food',cowork:'Co-Working',pet:'Pet',supplement:'Supplements',tea:'Tea/Matcha',bakery:'Bakery',clinic:'Wellness Clinic',mealprep:'Meal Prep',foodhall:'Food Hall',other:'Other'};

// ========== MAP ==========
const map=L.map('map').setView([40.733,-73.970],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'OSM, CARTO',maxZoom:19}).addTo(map);

// ========== OUTREACH DATA ==========
function loadO(){try{const d=localStorage.getItem('rb_outreach_v3');if(d)outreach=JSON.parse(d);}catch(e){}}
function saveO(){localStorage.setItem('rb_outreach_v3',JSON.stringify(outreach));}
function getO(id){if(!outreach[id])outreach[id]={statuses:[],channels:[],notes:'',assigned:null,deleted:false};if(!outreach[id].statuses)outreach[id].statuses=[];return outreach[id];}
function isContacted(o){return o.statuses&&o.statuses.length>0;}
function bestStatus(o){if(!o.statuses||!o.statuses.length)return'not_contacted';const p=['won','proposal_sent','meeting_set','visited','called','emailed','dm_sent','follow_up','not_interested'];for(const s of p)if(o.statuses.includes(s))return s;return o.statuses[0];}

// ========== TOAST ==========
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500);}

// ========== TABS ==========
function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{if(b.textContent.toLowerCase().includes(t==='map'?'map':t==='kanban'?'kanban':'pipeline'))b.classList.add('active');});
  document.getElementById('mapView').style.display=t==='map'?'flex':'none';
  document.getElementById('kanbanView').classList.toggle('visible',t==='kanban');
  document.getElementById('pipelineView').classList.toggle('visible',t==='pipeline');
  if(t==='kanban')renderKanban();
  if(t==='pipeline')renderPipeline();
  if(t==='map')setTimeout(()=>map.invalidateSize(),100);
}

// ========== FILTERS ==========
function buildFilters(){
  // Territory
  const tr=document.getElementById('terrRow');
  tr.innerHTML='';
  ['all','danielle','yasmeen'].forEach(t=>{
    const p=document.createElement('span');
    p.className='pill t-'+(t==='all'?'all':t[0])+' '+(fTerritory===t?'active':'');
    p.textContent=t==='all'?'All':t==='danielle'?'Danielle':'Yasmeen';
    p.onclick=()=>{fTerritory=t;buildFilters();render();};
    tr.appendChild(p);
  });
  // Categories
  const cats=new Set();BIZ.forEach(b=>cats.add(getCatGroup(b.category)));
  const cr=document.getElementById('catRow');cr.innerHTML='';
  [...cats].sort().forEach(c=>{
    const p=document.createElement('span');
    p.className='pill'+(fCats.has(c)?' active':'');
    p.textContent=CL[c]||c;
    p.onclick=()=>{fCats.has(c)?fCats.delete(c):fCats.add(c);buildFilters();render();};
    cr.appendChild(p);
  });
  // Statuses
  const sr=document.getElementById('statusRow');sr.innerHTML='';
  ['dm_sent','emailed','called','visited','follow_up','won','not_interested'].forEach(s=>{
    const p=document.createElement('span');
    p.className='pill'+(fStatuses.has(s)?' s-active':'');
    p.textContent=SL[s];
    p.onclick=()=>{fStatuses.has(s)?fStatuses.delete(s):fStatuses.add(s);buildFilters();render();};
    sr.appendChild(p);
  });
}

function getFiltered(){
  return BIZ.filter(b=>{
    const o=getO(b.id);
    if(o.deleted)return false;
    if(fTerritory!=='all'){const t=o.assigned||b.territory;if(t!==fTerritory)return false;}
    if(fCats.size>0&&!fCats.has(getCatGroup(b.category)))return false;
    if(fStatuses.size>0){if(!fStatuses.has('not_contacted')&&!o.statuses.length)return false;if(fStatuses.size>0&&!o.statuses.some(s=>fStatuses.has(s))&&!(fStatuses.has('not_contacted')&&!o.statuses.length))return false;}
    if(fSearch){const s=fSearch.toLowerCase();if(!(b.name.toLowerCase().includes(s)||(b.neighborhood||'').toLowerCase().includes(s)||(b.category||'').toLowerCase().includes(s)||(b.address||'').toLowerCase().includes(s)||(b.borough||'').toLowerCase().includes(s)||(b.city||'').toLowerCase().includes(s)||(b.state||'').toLowerCase().includes(s)))return false;}
    return true;
  });
}

// ========== RENDER MAP VIEW ==========
function render(){
  const filtered=getFiltered();
  markers.forEach(m=>map.removeLayer(m));markers=[];
  const grouped={};filtered.forEach(b=>{const nh=b.neighborhood||b.city||'Unknown';if(!grouped[nh])grouped[nh]=[];grouped[nh].push(b);});
  const el=document.getElementById('bizList');el.innerHTML='';
  let contacted=0,won=0;
  const hoods=Object.keys(grouped).sort();
  hoods.forEach(nh=>{
    const biz=grouped[nh];
    const g=document.createElement('div');g.className='nh-group';
    const h=document.createElement('div');h.className='nh-header';
    const t=biz[0].territory;
    h.style.borderLeftColor=t==='danielle'?'var(--danielle)':'var(--yasmeen)';
    h.innerHTML=`<span class="name">${nh}</span><span class="cnt">${biz.length}</span>`;
    g.appendChild(h);
    const items=document.createElement('div');items.style.display='none';
    h.onclick=()=>{items.style.display=items.style.display==='none'?'block':'none';};
    biz.forEach(b=>{
      const o=getO(b.id);
      if(isContacted(o))contacted++;
      if(o.statuses.includes('won'))won++;
      const isSel=selected.has(b.id);
      const ta=o.assigned||b.territory;
      const card=document.createElement('div');
      card.className='biz-card'+(isSel?' selected':'');
      const sTags=o.statuses.map(s=>`<span class="tag tag-s">${SL[s]}</span>`).join('');
      card.innerHTML=`<div class="cb" onclick="event.stopPropagation();toggleSel(${b.id})">${isSel?'&#10003;':''}</div><div class="biz-info"><div class="biz-name">${b.name}</div><div class="biz-sub">${b.category} &middot; ${b.address}</div><div><span class="tag tag-${ta==='danielle'?'d':'y'}">${ta==='danielle'?'Danielle':'Yasmeen'}</span>${sTags}</div></div>`;
      card.onclick=()=>openDetail(b);
      items.appendChild(card);
    });
    g.appendChild(items);el.appendChild(g);
  });
  // Map markers
  filtered.forEach(b=>{
    const o=getO(b.id);const cc=CC[getCatGroup(b.category)]||'#999';const bs=bestStatus(o);const sc=SC[bs];
    const sz=o.statuses.includes('won')?14:isContacted(o)?12:8;
    const icon=L.divIcon({className:'',html:`<div style="width:${sz}px;height:${sz}px;background:${cc};border:2px solid ${isContacted(o)?sc:'#fff'};border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2)"></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]});
    const stxt=isContacted(o)?o.statuses.map(s=>SL[s]).join(', '):'Not Contacted';
    const m=L.marker(b.coords,{icon}).bindPopup(`<b>${b.name}</b><br><span style="color:var(--accent);font-size:10px">${b.category}</span><br><span style="color:#999;font-size:10px">${b.address}</span><br><span style="font-size:10px;font-weight:600;color:${sc}">${stxt}</span>`,{maxWidth:260}).addTo(map);
    m.on('click',()=>openDetail(b));markers.push(m);
  });
  document.getElementById('sTotal').textContent=filtered.length;
  document.getElementById('sContacted').textContent=contacted;
  document.getElementById('sWon').textContent=won;
  document.getElementById('sHoods').textContent=hoods.length;
  updateBulkBar();
}

// ========== SELECTION / BULK ==========
function toggleSel(id){selected.has(id)?selected.delete(id):selected.add(id);render();}
function clearSelection(){selected.clear();render();}
function updateBulkBar(){
  const bar=document.getElementById('bulkBar');
  bar.classList.toggle('visible',selected.size>0);
  document.getElementById('bulkCount').textContent=selected.size;
}
function bulkSetStatus(status){
  selected.forEach(id=>{const o=getO(id);if(!o.statuses.includes(status))o.statuses.push(status);});
  saveO();
  selected.forEach(id=>syncLead(id));
  toast(`Marked ${selected.size} accounts as ${SL[status]}`);
  selected.clear();render();
}
function bulkDelete(){
  if(!confirm(`Delete ${selected.size} accounts? This hides them from the map.`))return;
  selected.forEach(id=>{getO(id).deleted=true;});
  saveO();toast(`Removed ${selected.size} accounts`);
  selected.clear();render();
}

// ========== KANBAN BOARD ==========
function renderKanban(){
  const el=document.getElementById('kanbanView');
  let html='<div class="kanban-board">';
  KANBAN_COLS.forEach(col=>{
    const statusKey=KANBAN_MAP[col];
    let accts;
    if(statusKey==='not_contacted'){
      accts=BIZ.filter(b=>{const o=getO(b.id);return!o.deleted&&!isContacted(o);});
    } else {
      accts=BIZ.filter(b=>{const o=getO(b.id);return!o.deleted&&o.statuses.includes(statusKey);});
    }
    // Apply territory filter
    if(fTerritory!=='all')accts=accts.filter(b=>(getO(b.id).assigned||b.territory)===fTerritory);

    html+=`<div class="kanban-col"><div class="kanban-col-head"><span class="title">${col}</span><span class="cnt">${accts.length}</span></div><div class="kanban-col-body">`;
    accts.slice(0,50).forEach(b=>{
      const o=getO(b.id);const ta=o.assigned||b.territory;
      const chans=(o.channels||[]).map(c=>c==='instagram'?'IG':c==='email'?'Em':c==='phone'?'Ph':c==='in_person'?'Visit':c).join(', ');
      html+=`<div class="kanban-card" onclick="switchTab('map');openDetailById(${b.id})"><div class="kname">${b.name}</div><div class="ksub">${b.neighborhood||b.city||''} &middot; ${b.category}</div><div class="ktags"><span class="tag tag-${ta==='danielle'?'d':'y'}">${ta==='danielle'?'D':'Y'}</span>${chans?'<span class="tag tag-s">'+chans+'</span>':''}</div></div>`;
    });
    if(accts.length>50)html+=`<div style="padding:6px;text-align:center;font-size:10px;color:var(--muted)">+${accts.length-50} more</div>`;
    html+=`</div></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

// ========== PIPELINE TABLE ==========
function renderPipeline(){
  const el=document.getElementById('pipelineView');
  const all=BIZ.filter(b=>{const o=getO(b.id);return!o.deleted&&isContacted(o);});
  if(!all.length){el.innerHTML='<div style="text-align:center;padding:60px;color:var(--muted)"><h3>No leads contacted yet</h3><p style="margin-top:8px">Start tracking outreach in the Map or Kanban view.</p></div>';return;}

  const counts={};STATUSES.forEach(s=>counts[s]=0);
  all.forEach(b=>{const o=getO(b.id);o.statuses.forEach(s=>{counts[s]=(counts[s]||0)+1;});});

  let sh='<div class="pipe-stats">';
  sh+=`<div class="pipe-stat"><div class="num" style="color:var(--accent)">${all.length}</div><div class="lbl">Contacted</div></div>`;
  STATUSES.forEach(s=>{if(counts[s])sh+=`<div class="pipe-stat"><div class="num" style="color:${SC[s]}">${counts[s]}</div><div class="lbl">${SL[s]}</div></div>`;});
  sh+='</div>';

  let th='<div class="pipe-tbl"><table><thead><tr><th>Business</th><th>Area</th><th>Assigned</th><th>Statuses</th><th>Channels</th><th>Notes</th></tr></thead><tbody>';
  all.sort((a,b)=>{const pA=STATUSES.indexOf(bestStatus(getO(a.id))),pB=STATUSES.indexOf(bestStatus(getO(b.id)));return pA-pB;}).forEach(b=>{
    const o=getO(b.id);const ta=(o.assigned||b.territory)==='danielle'?'Danielle':'Yasmeen';
    const pills=o.statuses.map(s=>`<span class="spill" style="background:${SC[s]}22;color:${SC[s]}">${SL[s]}</span>`).join(' ');
    const ch=(o.channels||[]).join(', ');const n=(o.notes||'').substring(0,40)+(o.notes&&o.notes.length>40?'...':'');
    th+=`<tr onclick="switchTab('map');openDetailById(${b.id})"><td><strong>${b.name}</strong><br><span style="font-size:9px;color:#999">${b.address}</span></td><td>${b.neighborhood||b.city||''}</td><td>${ta}</td><td>${pills}</td><td>${ch}</td><td style="font-size:10px;color:#777">${n}</td></tr>`;
  });
  th+='</tbody></table></div>';
  el.innerHTML=sh+th;
}

// ========== DETAIL PANEL ==========
function openDetailById(id){const b=BIZ.find(x=>x.id===id);if(b)openDetail(b);}
function openDetail(b){
  selBiz=b.id;const o=getO(b.id);
  document.getElementById('dName').textContent=b.name;
  document.getElementById('dCat').textContent=b.category;
  document.getElementById('dAddr').textContent=b.address;
  let ci='';if(b.phone)ci+=b.phone+' ';if(b.website)ci+=`<a href="${b.website}" target="_blank">Web</a> `;if(b.instagram)ci+=`<a href="${b.instagram}" target="_blank">IG</a> `;if(b.email)ci+=`<a href="mailto:${b.email}">${b.email}</a>`;
  document.getElementById('dContact').innerHTML=ci||'<span style="color:#ccc">No contact info</span>';

  // Status checkboxes
  const sc=document.getElementById('dStatuses');sc.innerHTML='';
  STATUSES.forEach(s=>{
    const on=o.statuses.includes(s);
    const l=document.createElement('label');l.className='chk'+(on?' on':'');l.dataset.s=s;
    l.innerHTML=`<input type="checkbox" ${on?'checked':''}>${SL[s]}`;
    l.querySelector('input').onchange=e=>{
      if(e.target.checked){if(!o.statuses.includes(s))o.statuses.push(s);l.classList.add('on');}
      else{o.statuses=o.statuses.filter(x=>x!==s);l.classList.remove('on');}
      saveO();syncLead(selBiz);
    };sc.appendChild(l);
  });

  document.getElementById('dNotes').value=o.notes||'';
  document.getElementById('dAssigned').value=o.assigned||b.territory;
  document.querySelectorAll('#dChannels .chk').forEach(el=>{
    const ch=el.dataset.ch;const on=(o.channels||[]).includes(ch);
    el.classList.toggle('on',on);el.querySelector('input').checked=on;
  });
  document.getElementById('eTo').value=b.email||'';
  document.getElementById('eSubject').value='Rooted Broth x '+b.name;
  document.getElementById('eBody').value='Hi '+b.name+' team,\n\nI\'m reaching out from Rooted Broth...\n\nBest,\nDanielle';
  document.getElementById('detailPanel').classList.add('open');
  map.setView(b.coords,15);
}
function closeDetail(){document.getElementById('detailPanel').classList.remove('open');selBiz=null;render();}
function saveCh(){if(!selBiz&&selBiz!==0)return;const o=getO(selBiz);o.channels=[];document.querySelectorAll('#dChannels .chk input:checked').forEach(el=>{o.channels.push(el.parentElement.dataset.ch);});document.querySelectorAll('#dChannels .chk').forEach(el=>{el.classList.toggle('on',el.querySelector('input').checked);});saveO();}
function saveAssigned(){if(!selBiz&&selBiz!==0)return;getO(selBiz).assigned=document.getElementById('dAssigned').value;saveO();}
function saveNotes(){if(!selBiz&&selBiz!==0)return;getO(selBiz).notes=document.getElementById('dNotes').value;saveO();}
function saveAndClose(){saveCh();saveAssigned();saveNotes();saveO();syncLead(selBiz);closeDetail();}
function deleteOne(){if(!selBiz&&selBiz!==0)return;if(!confirm('Remove this account from the map?'))return;getO(selBiz).deleted=true;saveO();toast('Account removed');closeDetail();}

// ========== ZOHO SYNC ==========
function syncLead(id){
  if(!API&&window.location.protocol==='https:')return;
  const b=BIZ.find(x=>x.id===id);if(!b)return;const o=getO(id);
  const ta=(o.assigned||b.territory)==='danielle'?'Danielle':'Yasmeen';
  fetch(API+'/api/zoho/sync-lead',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:b.name,phone:b.phone||'',website:b.website||'',address:b.address,category:b.category,neighborhood:b.neighborhood||b.city||'',borough:b.borough||b.state||'',statuses:(o.statuses||[]).map(s=>SL[s]),channels:o.channels||[],notes:o.notes||'',assigned:ta,email:b.email||'',instagram:b.instagram||'',rating:b.rating||'',reviewCount:b.reviewCount||''})
  }).then(r=>r.json()).then(d=>{if(d.success)toast('Synced: '+b.name);}).catch(()=>{});
}
function syncOne(){if(selBiz!==null)syncLead(selBiz);}

function connectZoho(){
  const url=prompt('Enter your Render backend URL\n(e.g. https://rooted-broth-sales-map.onrender.com)\n\nLeave blank for localhost:3456');
  if(url!==null){localStorage.setItem('rb_api',url.trim().replace(/\/$/,''));window.location.reload();}
}

// ========== EMAIL ==========
function sendEmail(){
  const to=document.getElementById('eTo').value,subj=document.getElementById('eSubject').value,body=document.getElementById('eBody').value;
  if(!to){alert('Enter recipient email');return;}
  fetch(API+'/api/zoho/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to,subject:subj,body,accountName:document.getElementById('dName').textContent})
  }).then(r=>r.json()).then(d=>{
    toast('Email logged for '+to);const o=getO(selBiz);
    if(!o.statuses.includes('emailed'))o.statuses.push('emailed');
    if(!o.channels.includes('email'))o.channels.push('email');saveO();syncLead(selBiz);render();
  }).catch(()=>alert('Server not reachable. Use "Open Mail App" instead.'));
}
function openMailto(){
  const to=document.getElementById('eTo').value,subj=document.getElementById('eSubject').value,body=document.getElementById('eBody').value;
  window.open('mailto:'+encodeURIComponent(to)+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body));
  const o=getO(selBiz);if(!o.statuses.includes('emailed'))o.statuses.push('emailed');if(!o.channels.includes('email'))o.channels.push('email');saveO();
}

// ========== CSV EXPORT ==========
function exportCSV(){
  const f=getFiltered();
  const h=['Name','Category','Address','Area','State','Territory','Statuses','Channels','Notes','Phone','Website','Email','Instagram','Rating','Reviews'];
  const rows=f.map(b=>{const o=getO(b.id);return[b.name,b.category,b.address,b.neighborhood||b.city||'',b.state||b.borough||'',(o.assigned||b.territory)==='danielle'?'Danielle':'Yasmeen',(o.statuses||[]).map(s=>SL[s]).join('; '),(o.channels||[]).join('; '),(o.notes||'').replace(/"/g,"'"),b.phone||'',b.website||'',b.email||'',b.instagram||'',b.rating||'',b.reviewCount||''];});
  let csv=h.join(',')+'\n';rows.forEach(r=>{csv+=r.map(v=>'"'+v+'"').join(',')+'\n';});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='rooted-broth-leads-'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

// ========== EVENTS ==========
document.getElementById('searchBox').addEventListener('input',e=>{fSearch=e.target.value;render();});

// ========== INIT ==========
async function init(){
  loadO();
  try{
    const r=await fetch('all-targets.json');const d=await r.json();
    BIZ=d.filter(b=>!getO(0).deleted).map((b,i)=>({...b,id:i,territory:b.territory||getTerritory(b.neighborhood||b.city||''),coords:b.lat&&b.lng?[b.lat,b.lng]:getCoords(b.neighborhood||b.city||'')}));
  }catch(e){console.error('Failed to load data');BIZ=[];}
  buildFilters();render();
}
init();
</script>
